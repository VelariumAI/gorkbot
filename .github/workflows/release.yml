name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to release (example: v1.6.0-rc). Leave empty when running from a tag push.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve-tag:
    name: Resolve Release Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          tag=""
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && -n "${GITHUB_REF_NAME:-}" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
          fi

          if [[ -z "$tag" ]]; then
            echo "ERROR: release tag is required. Use a v* tag push or provide workflow_dispatch input." >&2
            exit 1
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

  validate:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    needs: [resolve-tag]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Enforce tag/version sync (public policy)
        env:
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.release_tag }}
          TAG_POLICY: public
        run: bash scripts/check_tag_version_sync.sh

      - name: Run release readiness checklist
        run: bash scripts/release_checklist.sh

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: [resolve-tag, validate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          mkdir -p dist
          out="dist/gorkbot-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath -tags "with_security,with_plugins,with_headless,with_mcp" -o "$out" ./cmd/gorkbot
          ls -lh "$out"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gorkbot-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/gorkbot-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve-tag, build]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gorkbot-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum gorkbot-* > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.release_tag }}
          files: |
            dist/gorkbot-*
            dist/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
